# Flattune Configuration for Olympic Athletes Dataset (271K athletes 1800-2000)
# Dataset: https://huggingface.co/datasets/flatseek/public-dataset
# File: 271k-athletes.fsk (75.6 MB)
#
# For fast testing, this config uses max_samples: 500
# For full training, increase max_samples and epochs

name: athletes-qa
description: Olympic athletes dataset fine-tuning (271K athletes, partial for testing)

# Flatseek index configuration - remote .fsk file from HuggingFace
flatseek:
  mode: auto
  path: https://huggingface.co/datasets/flatseek/public-dataset/resolve/main/271k-athletes.fsk
  query: "*"
  # encryption_key: null  # Not needed for public dataset

# Dataset generation configuration
dataset:
  type: qa
  # Query: Asian athletes (China, Japan, Korea, India, etc.)
  query: "country:(China OR Japan OR Korea OR India OR Indonesia OR Thailand OR Vietnam OR Philippines OR Malaysia OR Singapore OR Bangladesh OR Pakistan OR Kazakhstan OR Uzbekistan OR Turkmenistan OR Kyrgyzstan OR Tajikistan OR Iran OR Iraq OR Saudi Arabia OR Syria OR Jordan OR Lebanon OR Israel OR Turkey OR Mongolia OR Nepal OR Sri Lanka OR Myanmar OR Cambodia OR Laos OR Brunei OR Maldives OR Bhutan OR Afghanistan OR Taiwan OR Hong Kong OR Macau)"
  tags: null
  field_mapping:
    name: instruction
    body: input
    answer: output
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  max_samples: 500  # Fast testing - use 500 samples
  min_length: 10
  max_length: 2048
  generators:
    - qa
    - facts

# Model configuration (using HuggingFace Bonsai model)
model:
  source: huggingface
  #repo: HuggingFaceTB/SmolLM2-360M-Instruct  # Small model for MPS testing
  repo: HuggingFaceTB/SmolLM2-135M
  path: null
  adapter_path: null

# Training configuration (optimized for fast testing)
train:
  backend: transformers  # Use transformers for CPU/MPS testing (change to unsloth for GPU)
  epochs: 1  # Fast testing - 1 epoch
  lr: 2e-4
  lora_rank: 8  # Smaller rank for faster training
  lora_alpha: 16
  lora_dropout: 0.05
  batch_size: 1  # Small batch for testing
  max_seq_length: 1024  # Reduced for faster training
  max_samples: 500  # Match dataset max_samples
  gradient_accumulation: 4
  warmup_steps: 10
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42
  bf16: false  # Use fp16 instead for broader compatibility
  fp16: true
  gradient_checkpointing: false  # Disable for faster training
  use_qwen3_format: false

# Export configuration
export:
  format: gguf
  quantization: Q4_K_M
  output_dir: null

# Benchmark configuration
benchmark:
  backend: lmstudio
  prompt_file: configs/athletes-prompts.json  # Domain-specific prompts
  num_runs: 3  # Fast testing - 3 runs
  max_tokens: 256  # Reduced for faster benchmark
  temperature: 0.7
  top_p: 0.9

output_dir: outputs/athletes-qa
