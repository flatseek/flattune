name: test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Smoke-test CLI
        run: |
          flattune --version
          flattune --help
          flattune build --help
          flattune train --help
          flattune teach --help

      - name: Run tests
        run: pytest tests/ -v

      - name: Run linting
        run: |
          pip install ruff
          ruff check src/
          ruff format --check src/
